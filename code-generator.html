<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>补光照相机 — 激活码生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;
  background:linear-gradient(135deg,#0d0a08,#1a1410);
  color:#e8ddd0;min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.card{
  background:rgba(22,18,14,0.9);border:1px solid rgba(255,220,180,0.1);
  border-radius:24px;padding:36px 32px;width:420px;max-width:100%;
  box-shadow:0 30px 80px rgba(0,0,0,0.5),0 0 60px rgba(255,200,100,0.03);
}
h1{
  font-size:22px;color:#ffd700;text-align:center;margin-bottom:6px;
  letter-spacing:1px;font-weight:600;
}
.subtitle{text-align:center;color:rgba(255,220,180,0.35);font-size:13px;margin-bottom:28px}

.warn-box{
  background:rgba(255,200,100,0.06);border:1px solid rgba(255,200,100,0.2);
  border-radius:12px;padding:12px 16px;margin-bottom:24px;font-size:12.5px;
  line-height:1.7;color:rgba(255,220,180,0.55);
}
.warn-box b{color:rgba(255,230,200,0.85)}

.section{margin-bottom:24px}
.section label{display:block;font-size:13px;color:rgba(255,220,180,0.5);margin-bottom:8px;font-weight:500}

input[type=number],input[type=text]{
  width:100%;padding:12px 16px;border-radius:14px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,220,180,0.1);
  color:#fff;font-size:16px;outline:none;transition:border-color .2s;
}
input:focus{border-color:rgba(255,215,0,0.4)}
input::placeholder{color:rgba(255,255,255,0.15)}

.btn-generate{
  width:100%;padding:14px;border-radius:14px;border:none;
  background:linear-gradient(135deg,#ffd700,#ffb347);color:#1a1410;
  font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;
  letter-spacing:1px;margin-top:4px;
}
.btn-generate:active{transform:scale(0.97)}
.btn-generate:hover{box-shadow:0 4px 24px rgba(255,215,0,0.3)}

/* Generated codes display */
.codes-result{
  margin-top:20px;display:none;
}
.codes-result.show{display:block}
.code-item{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.15);
  border-radius:12px;padding:14px 18px;margin-bottom:8px;
}
.code-text{
  font-family:'SF Mono',Menlo,Consolas,'Courier New',monospace;
  font-size:18px;font-weight:700;color:#ffd700;letter-spacing:3px;
  user-select:all;-webkit-user-select:all;
}
.code-copy{
  padding:7px 16px;border-radius:10px;border:none;
  background:rgba(255,215,0,0.15);color:rgba(255,215,0,0.85);
  font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap;
}
.code-copy:active{transform:scale(0.93)}

/* History */
.history{margin-top:20px}
.history-title{font-size:12px;color:rgba(255,220,180,0.3);margin-bottom:10px;text-transform:uppercase;letter-spacing:2px}
.history-empty{font-size:12px;color:rgba(255,220,180,0.2);text-align:center;padding:16px}
.history-list{max-height:240px;overflow-y:auto}
.history-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;border-bottom:1px solid rgba(255,220,180,0.05);
  font-size:12px;
}
.history-code{font-family:monospace;color:rgba(255,215,0,0.7);letter-spacing:1px}
.history-time{color:rgba(255,220,180,0.25);flex-shrink:0;margin-left:12px}

.stats{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;
}
.stat-card{
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,220,180,0.06);
  border-radius:12px;padding:14px;text-align:center;
}
.stat-num{font-size:26px;font-weight:700;color:#ffd700}
.stat-label{font-size:11px;color:rgba(255,220,180,0.3);margin-top:2px}

.footer{
  text-align:center;margin-top:20px;font-size:11px;color:rgba(255,220,180,0.15);
}
</style>
</head>
<body>

<div class="card">
  <h1>&#9733; 激活码生成器</h1>
  <p class="subtitle">补光照相机 Pro 会员 — 收款后生成激活码发给用户</p>

  <div class="warn-box">
    <b>安全提示：</b><br>
    此工具仅由开发者（你）使用，请勿将此页面链接公开分享。<br>
    用户付款 &yen;68 后，复制生成的激活码发送给用户即可。
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="totalGenerated">0</div>
      <div class="stat-label">已生成总数</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="todayGenerated">0</div>
      <div class="stat-label">今日生成</div>
    </div>
  </div>

  <div class="section">
    <label>生成数量（一次最多 20 个）</label>
    <input type="number" id="genCount" value="5" min="1" max="20">
  </div>

  <button class="btn-generate" id="btnGenerate">生成激活码</button>

  <div class="codes-result" id="codesResult"></div>

  <div class="history">
    <div class="history-title">生成记录</div>
    <div class="history-list" id="historyList">
      <div class="history-empty">暂无记录</div>
    </div>
  </div>

  <div class="footer">
    补光照相机 Pro &middot; RingLight Camera
  </div>
</div>

<script>
// Same secret key as the app — must match!
var SECRET_KEY = 'RingLight2026-Pro';

function generateCode() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // No ambiguous chars (0/O/1/I/L)
  var code = '';
  // Generate random 12 characters
  for (var i = 0; i < 12; i++) {
    code += chars.charAt(Math.floor(Math.random() * chars.length));
  }

  // Now we need to adjust so that computeCodeHash returns true
  // We'll try appending a checksum char or adjusting the last few chars
  // Strategy: brute force the last 2 positions to find valid combinations

  // Actually, let's use a smarter approach:
  // Generate base 10 chars randomly, then find 2 trailing chars that make it valid
  var prefix = '';
  for (var j = 0; j < 10; j++) {
    prefix += chars.charAt(Math.floor(Math.random() * chars.length));
  }

  // Find suffix (last 2 chars) that makes hash valid
  for (var a = 0; a < chars.length; a++) {
    for (var b = 0; b < chars.length; b++) {
      var candidate = prefix + chars[a] + chars[b];
      if (computeCodeHash(candidate)) {
        return formatCode(candidate);
      }
    }
  }
  // Fallback (shouldn't happen)
  return generateCode(); // retry
}

function formatCode(chars) {
  return chars.substring(0, 4) + '-' + chars.substring(4, 8) + '-' + chars.substring(8, 12);
}

function computeCodeHash(chars) {
  var key = SECRET_KEY;
  var hash = 0;
  for (var i = 0; i < chars.length; i++) {
    hash = ((hash << 5) - hash) + chars.charCodeAt(i) + key.charCodeAt(i % key.length);
    hash = hash & hash;
  }
  return (hash % 7 === 0 || hash % 13 === 0);
}

function verifyCode(code) {
  if (!code || typeof code !== 'string') return false;
  code = code.trim().toUpperCase();
  if (!/^[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/.test(code)) return false;
  return computeCodeHash(code.replace(/-/g, ''));
}

// ===== UI Logic =====
var historyData = JSON.parse(localStorage.getItem('pro_gen_history') || '[]');
var totalGen = parseInt(localStorage.getItem('pro_gen_total') || '0');
var todayStr = new Date().toISOString().split('T')[0];
var todayGen = parseInt(localStorage.getItem('pro_gen_today_' + todayStr) || '0');

document.getElementById('totalGenerated').textContent = totalGen;
document.getElementById('todayGenerated').textContent = todayGen;

renderHistory();

document.getElementById('btnGenerate').addEventListener('click', function() {
  var count = Math.min(20, Math.max(1, parseInt(document.getElementById('genCount').value) || 5));
  var resultEl = document.getElementById('codesResult');
  var html = '<p style="font-size:13px;color:rgba(255,220,180,0.45);margin-bottom:12px">点击代码可全选复制：</p>';

  var now = new Date();
  var batch = [];

  for (var i = 0; i < count; i++) {
    var code = generateCode();
    batch.push(code);

    html += '<div class="code-item">';
    html += '<span class="code-text">' + code + '</span>';
    html += '<button class="code-copy" onclick="copyCode(this,\'' + code + '\')">复制</button>';
    html += '</div>';

    historyData.unshift({
      code: code,
      time: now.toLocaleString('zh-CN')
    });
  }

  // Update stats
  totalGen += count;
  todayGen += count;
  localStorage.setItem('pro_gen_total', totalGen);
  localStorage.setItem('pro_gen_today_' + todayStr, todayGen);
  document.getElementById('totalGenerated').textContent = totalGen;
  document.getElementById('todayGenerated').textContent = todayGen;

  // Save history (keep last 50)
  if (historyData.length > 50) historyData = historyData.slice(0, 50);
  localStorage.setItem('pro_gen_history', JSON.stringify(historyData));

  resultEl.innerHTML = html;
  resultEl.classList.add('show');
  renderHistory();
});

window.copyCode = function(btn, code) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(code).then(function() {
      btn.textContent = '\u2705 已复制';
      setTimeout(function() { btn.textContent = '复制'; }, 1500);
    });
  } else {
    // Fallback
    var tmp = document.createElement('textarea');
    tmp.value = code;
    document.body.appendChild(tmp);
    tmp.select();
    document.execCommand('copy');
    document.body.removeChild(tmp);
    btn.textContent = '\u2705 已复制';
    setTimeout(function() { btn.textContent = '复制'; }, 1500);
  }
};

function renderHistory() {
  var listEl = document.getElementById('historyList');
  if (historyData.length === 0) {
    listEl.innerHTML = '<div class="history-empty">暂无记录</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < Math.min(historyData.length, 30); i++) {
    html += '<div class="history-item">';
    html += '<span class="history-code">' + historyData[i].code + '</span>';
    html += '<span class="history-time">' + historyData[i].time + '</span>';
    html += '</div>';
  }
  listEl.innerHTML = html;
}
</script>
</body>
</html>
