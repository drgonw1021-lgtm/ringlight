        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" rx="112"/>
  <circle cx="256" cy="256" r="155" fill="none" stroke="url(#ring)" stroke-width="38" filter="url(#glow)" opacity="0.9"/>
